publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  go_router: ^14.2.7
  flutter_animate: ^4.5.0
  url_launcher: ^6.3.0
  table_calendar: ^3.1.2
  photo_view: ^0.15.0
  intl: ^0.20.2
  easy_localization: ^3.0.7
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  shared_preferences: ^2.3.2
  uuid: ^4.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
